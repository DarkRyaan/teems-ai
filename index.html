<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Teams and Channels</title>

<link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/4/44/Microsoft_logo.svg">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  height: 100vh;
}

#login {
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
  gap:10px;
}

#login input {
  padding:12px;
  width:240px;
  border-radius:10px;
  border:none;
}

#chat {
  display:none;
  flex-direction:column;
  height:100vh;
}

#header {
  background:#020617;
  padding:10px;
}

#messages {
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:10px;
  background:#020617;
}

.message {
  padding:10px;
  border-radius:12px;
  max-width:75%;
}

.user { background:#3b82f6; align-self:flex-end; }
.ai { background:#334155; align-self:flex-start; }

#inputArea {
  display:flex;
  padding:10px;
  gap:5px;
  background:#0f172a;
}

textarea {
  flex:1;
  padding:10px;
  border-radius:8px;
  border:none;
  resize:none;
  height:40px;
}

button {
  padding:10px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  color:white;
}

/* broadcast popup container */
#popupContainer {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 9999;
}
</style>
</head>

<body>

<div id="popupContainer"></div>

<!-- LOGIN -->
<div id="login">
  <h2>Sign in</h2>
  <input type="password" id="password">
  <button onclick="login()">Login</button>
</div>

<!-- CHAT -->
<div id="chat">
  <div id="header">AI Chat</div>
  <div id="messages"></div>

  <div id="inputArea">
    <textarea id="userInput" placeholder="Type a message..."></textarea>
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
const API = "https://backend.ryaana059.workers.dev";

let messages = document.getElementById("messages");
let userInput = document.getElementById("userInput");

/* LOGIN */
function login() {
  fetch(API + "/login", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      password: document.getElementById("password").value
    })
  })
  .then(r => r.json())
  .then(data => {
    if (data.success) {
      localStorage.setItem("sessionVersion", data.sessionVersion);
      document.getElementById("login").style.display = "none";
      document.getElementById("chat").style.display = "flex";
    } else {
      window.location.href = "https://teams.cloud.microsoft";
    }
  });
}

/* ENTER KEY */
userInput.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

/* CHAT STORAGE */
let chat = JSON.parse(localStorage.getItem("chat") || "[]");
chat.forEach(m => render(m.role, m.text, false));

function render(role, text, save=true){
  const div = document.createElement("div");
  div.className = "message " + role;
  div.innerText = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;

  if (save) {
    chat.push({ role, text });
    localStorage.setItem("chat", JSON.stringify(chat));
  }
}

/* SEND */
async function sendMessage() {
  const text = userInput.value.trim();
  if (!text) return;

  userInput.value = "";

  if (text.toLowerCase() === "te") {
    window.location.href = "https://teams.cloud.microsoft";
    return;
  }

  render("user", text);

  const res = await fetch(API, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      messages:[{role:"user",content:text}]
    })
  });

  const data = await res.json();

  render("ai", data?.choices?.[0]?.message?.content || "No response");
}

/* BROADCAST POPUP */
setInterval(async () => {
  try {
    const res = await fetch(API + "/status");
    const data = await res.json();

    const last = localStorage.getItem("lastBroadcastId");

    if (data.broadcast && data.broadcast.id !== last) {

      localStorage.setItem("lastBroadcastId", data.broadcast.id);

      const popup = document.createElement("div");
      popup.innerText = "📢 " + data.broadcast.text;

      popup.style.background = "#22c55e";
      popup.style.color = "black";
      popup.style.padding = "12px 16px";
      popup.style.borderRadius = "10px";
      popup.style.fontWeight = "bold";
      popup.style.marginTop = "10px";

      document.getElementById("popupContainer").innerHTML = "";
      document.getElementById("popupContainer").appendChild(popup);

      setTimeout(() => {
        document.getElementById("popupContainer").innerHTML = "";
      }, 4000);
    }

  } catch {}
}, 2000);

/* CLEAR CHAT SYNC */
setInterval(async () => {
  try {
    const res = await fetch(API + "/status");
    const data = await res.json();

    const lastClear = localStorage.getItem("lastClear");

    if (data.lastCleared && data.lastCleared !== lastClear) {
      localStorage.setItem("lastClear", data.lastCleared);
      localStorage.removeItem("chat");
      messages.innerHTML = "";
    }

  } catch {}
}, 3000);
</script>

</body>
</html>
