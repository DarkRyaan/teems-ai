<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My AI Chat</title>

  <!-- Teams-like favicon -->
  <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/8/83/Microsoft_Teams_Logo_%282018-present%29.svg">

  <!-- Markdown parser -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    body {
      background: #0f172a;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
    }

    #login {
      margin-top: 100px;
    }

    #chat {
      width: 420px;
      margin: 20px auto;
      background: #1e293b;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 0 25px rgba(0,0,0,0.4);
    }

    #header {
      background: #020617;
      padding: 15px;
      font-weight: bold;
    }

    #messages {
      height: 350px;
      overflow-y: auto;
      padding: 10px;
      background: #020617;
    }

    .message {
      padding: 10px;
      margin: 8px 0;
      border-radius: 12px;
      max-width: 75%;
      text-align: left;
      animation: fadeIn 0.2s ease-in;
      word-wrap: break-word;
    }

    .user { background: #3b82f6; margin-left: auto; }
    .ai { background: #334155; }

    .typing { opacity: 0.7; font-style: italic; }

    #inputArea {
      display: flex;
      padding: 10px;
      gap: 5px;
    }

    textarea {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      resize: none;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #22c55e;
      color: white;
      cursor: pointer;
    }

    button:hover { background: #16a34a; }

    pre {
      background: #000;
      padding: 10px;
      border-radius: 8px;
      overflow-x: auto;
    }

    code {
      color: #22c55e;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

<div id="login">
  <h2>Enter Access</h2>
  <input type="password" id="password" placeholder="Password" />
  <button onclick="setCookieAndCheck()">Enter</button>
</div>

<div id="chat" style="display:none;">
  <div id="header">My AI Chat 💬</div>
  <div id="messages"></div>
  <div id="inputArea">
    <textarea id="userInput" placeholder="Type a message..."></textarea>
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
let chatHistory = JSON.parse(localStorage.getItem("chatHistory")) || [];

// Load old messages
function loadHistory() {
  chatHistory.forEach(entry => {
    const [sender, ...text] = entry.split(": ");
    addMessage(text.join(": "), sender.toLowerCase());
  });
}

// Cookie login
function checkAccess() {
  const cookieValue = document.cookie
    .split("; ")
    .find(row => row.startsWith("chat_access="))
    ?.split("=")[1];

  if (cookieValue === "NordVPN") {
    document.getElementById("login").style.display = "none";
    document.getElementById("chat").style.display = "block";
    loadHistory();
  }
}

function setCookieAndCheck() {
  const input = document.getElementById("password").value;

  if (input === "NordVPN") {
    document.cookie = "chat_access=NordVPN; path=/";
    checkAccess();
  } else {
    window.location.href = "https://teams.cloud.microsoft";
  }
}

// Format text (markdown + emojis)
function formatText(text) {
  return marked.parse(text);
}

// Add message
function addMessage(text, sender) {
  const msg = document.createElement("div");
  msg.className = "message " + sender;
  msg.innerHTML = formatText(text);

  document.getElementById("messages").appendChild(msg);
  document.getElementById("messages").scrollTop =
    document.getElementById("messages").scrollHeight;
}

// Send message
async function sendMessage() {
  const inputBox = document.getElementById("userInput");
  const message = inputBox.value.trim();
  if (!message) return;

  addMessage(message, "user");
  chatHistory.push("User: " + message);
  localStorage.setItem("chatHistory", JSON.stringify(chatHistory));

  inputBox.value = "";

  const typing = document.createElement("div");
  typing.className = "message ai typing";
  typing.id = "typing";
  typing.innerText = "AI is typing...";
  document.getElementById("messages").appendChild(typing);

  try {
    const prompt = `
You are a helpful assistant.

Conversation so far:
${chatHistory.join("\n")}

AI:
`;

    const response = await fetch(
      "https://text.pollinations.ai/" + encodeURIComponent(prompt)
    );

    let reply = await response.text();
    reply = reply.trim();

    document.getElementById("typing").remove();
    addMessage(reply, "ai");

    chatHistory.push("AI: " + reply);
    localStorage.setItem("chatHistory", JSON.stringify(chatHistory));

  } catch {
    document.getElementById("typing").remove();
    addMessage("⚠️ Error connecting to AI", "ai");
  }
}

// Enter key
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("userInput").addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
});

window.addEventListener("load", checkAccess);
</script>

</body>
</html>
