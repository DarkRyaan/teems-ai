<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Teams and Channels | General | Microsoft Teams</title>

<link rel="icon" href="https://th.bing.com/th?q=Team%27s+Logo+White+Background&w=120&h=120&c=1&rs=1&qlt=70&o=7&dpr=2">

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
body {
  background: #0f172a;
  font-family: Arial;
  color: white;
  margin: 0;
  height: 100vh;
}

#login {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

#chat {
  width: 100vw;
  height: 100vh;
  display: none;
  flex-direction: column;
  background: #1e293b;
}

#header {
  background: #020617;
  padding: 10px;
}

#messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  background: #020617;
}

.message {
  padding: 10px;
  border-radius: 12px;
  max-width: 75%;
}

.user { background: #3b82f6; align-self: flex-end; }
.ai { background: #334155; align-self: flex-start; }

#inputArea {
  display: flex;
  padding: 10px;
}

textarea {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

button {
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #22c55e;
  color: white;
}
</style>
</head>

<body>

<div id="login">
  <h2>Enter Access</h2>
  <input type="password" id="password">
  <button onclick="login()">Enter</button>
</div>

<div id="chat">
  <div id="header">AI Chat 💬</div>
  <div id="messages"></div>

  <div id="inputArea">
    <textarea id="userInput" placeholder="Type here"></textarea>
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
const API = "https://backend.ryaana059.workers.dev/";

let messages, userInput;
let lastClear = localStorage.getItem("lastClear") || 0;
let lastBroadcastId = localStorage.getItem("lastBroadcastId") || null;

/* INIT */
window.addEventListener("DOMContentLoaded", () => {
  messages = document.getElementById("messages");
  userInput = document.getElementById("userInput");

  setupEnterKey();
});

/* LOGIN */
async function login() {
  const pass = document.getElementById("password").value;

  if (!pass) {
    alert("Enter password");
    return;
  }

  try {
    const res = await fetch(API + "/login", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ password: pass })
    });

    const data = await res.json();

    if (data.success) {
      document.cookie = "chat_access=1"; // ✅ FIX
      document.getElementById("login").style.display = "none";
      document.getElementById("chat").style.display = "flex";
    } else {
      alert("Wrong password");
    }

  } catch {
    alert("Server error");
  }
}

/* AUTO LOGIN AFTER REFRESH */
window.onload = () => {
  if (document.cookie.includes("chat_access=1")) {
    document.getElementById("login").style.display = "none";
    document.getElementById("chat").style.display = "flex";
  }
};

/* SEND */
async function sendMessage() {
  const text = userInput.value.trim();
  if (!text) return;

  userInput.value = "";
  add("user", text);

  const typing = document.createElement("div");
  typing.className = "message ai";
  typing.innerText = "AI is typing...";
  messages.appendChild(typing);

  try {
    const res = await fetch(API, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        messages: [{ role: "user", content: text }]
      })
    });

    const data = await res.json();
    typing.remove();

    add("ai", data?.choices?.[0]?.message?.content || "No response");

  } catch {
    typing.remove();
    add("ai", "⚠️ Error");
  }
}

/* ADD */
function add(type, text) {
  const div = document.createElement("div");
  div.className = "message " + type;
  div.innerText = text;

  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

/* ENTER TO SEND */
function setupEnterKey() {
  userInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
}

/* STATUS SYNC */
async function checkStatus() {
  try {
    const res = await fetch(API + "/status"); // ✅ FIX
    const data = await res.json();

    if (!data) return;

    if (data.lastCleared && data.lastCleared !== lastClear) {
      lastClear = data.lastCleared;
      localStorage.setItem("lastClear", lastClear);
      messages.innerHTML = "";
    }

    if (data.broadcast?.id && data.broadcast.id !== lastBroadcastId) {
      lastBroadcastId = data.broadcast.id;
      localStorage.setItem("lastBroadcastId", lastBroadcastId);
      alert("SITE ADMIN: " + data.broadcast.text);
    }

  } catch {}
}

setInterval(checkStatus, 3000);
</script>

</body>
</html>
