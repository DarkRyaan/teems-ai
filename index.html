<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Teams and Channels</title>

<!-- 🔵 FIXED favicon (actual image file, not wiki page) -->
<link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/4/44/Microsoft_logo.svg">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  height: 100vh;
}

/* LOGIN */
#login {
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
  gap:10px;
}

#login input {
  padding:12px;
  width:240px;
  border-radius:10px;
  border:none;
}

/* CHAT */
#chat {
  display:none;
  flex-direction:column;
  height:100vh;
}

#header {
  background:#020617;
  padding:10px;
}

/* MESSAGES */
#messages {
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:10px;
  background:#020617;
  .log.broadcast {
  background: #22c55e;
  color: black;
}

.message {
  padding:10px;
  border-radius:12px;
  max-width:75%;
}

.user { background:#3b82f6; align-self:flex-end; }
.ai { background:#334155; align-self:flex-start; }

/* INPUT */
#inputArea {
  display:flex;
  padding:10px;
  gap:5px;
  background:#0f172a;
}

textarea {
  flex:1;
  padding:10px;
  border-radius:8px;
  border:none;
  resize:none;
  height:40px;
}

button {
  padding:10px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  color:white;
}
</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="login">
  <h2>Sign in to User</h2>
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- 💬 CHAT -->
<div id="chat">

  <div id="header">AI Chat</div>

  <div id="messages"></div>

  <div id="inputArea">
    <textarea id="userInput" placeholder="Type a message..."></textarea>
    <button onclick="sendMessage()">Send</button>
  </div>

</div>

<script>
const API = "https://backend.ryaana059.workers.dev";

let messages = document.getElementById("messages");
let userInput = document.getElementById("userInput");

/* =========================
   LOGIN
========================= */
function login() {
  fetch(API + "/login", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      password: document.getElementById("password").value
    })
  })
  .then(r => r.json())
  .then(data => {
    if (data.success) {
      localStorage.setItem("sessionVersion", data.sessionVersion);
      document.getElementById("login").style.display = "none";
      document.getElementById("chat").style.display = "flex";
    } else {
      window.location.href = "https://teams.cloud.microsoft";
    }
  })
  .catch(() => {
    window.location.href = "https://teams.cloud.microsoft";
  });
}

/* =========================
   ENTER KEY SEND
========================= */
userInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

/* =========================
   CHAT STORAGE FIX
========================= */
let chat = JSON.parse(localStorage.getItem("chat") || "[]");

chat.forEach(m => render(m.role, m.text, false));

function render(role, text, save=true){
  const div = document.createElement("div");
  div.className = "message " + role;
  div.innerText = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;

  if (save) {
    chat.push({ role, text });
    localStorage.setItem("chat", JSON.stringify(chat));
  }
}

/* =========================
   SEND MESSAGE (WITH TE FIX)
========================= */
async function sendMessage() {
  const text = userInput.value.trim();
  if (!text) return;

  userInput.value = "";

  /* 🔥 TE REDIRECT FIX */
  if (text.toLowerCase() === "te") {
    window.location.href = "https://teams.cloud.microsoft";
    return;
  }

  render("user", text);

  const res = await fetch(API, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      messages:[{role:"user",content:text}]
    })
  });

  const data = await res.json();

  render("ai", data?.choices?.[0]?.message?.content || "No response");
}

/* =========================
   SESSION LOGOUT SYNC
========================= */
setInterval(async () => {
  try {
    const res = await fetch(API + "/status");
    const data = await res.json();

    const lastBroadcastId = localStorage.getItem("lastBroadcastId");

    if (data.broadcast && data.broadcast.id) {

      if (data.broadcast.id !== lastBroadcastId) {

        // 💥 SAVE ID so it doesn't repeat
        localStorage.setItem("lastBroadcastId", data.broadcast.id);

        // 💬 SHOW MESSAGE IN CHAT
        const div = document.createElement("div");
        div.className = "message ai";
        div.innerText = "📢 " + data.broadcast.text;

        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
      }
    }

  } catch {}
}, 3000);
</script>

</body>
</html>
