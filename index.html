<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Teams and Channels</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  height:100vh;
}

#messages {
  height:90vh;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.message {
  padding:10px;
  border-radius:10px;
  max-width:75%;
}

.user { background:#3b82f6; align-self:flex-end; }
.ai { background:#334155; align-self:flex-start; }

#input {
  display:flex;
  height:10vh;
  padding:10px;
  gap:5px;
}

textarea {
  flex:1;
  padding:10px;
}

button {
  width:100px;
  background:#22c55e;
  color:white;
  border:none;
}
</style>
</head>

<body>

<div id="messages"></div>

<div id="input">
  <textarea id="text"></textarea>
  <button onclick="send()">Send</button>
</div>

<script>
const API = "https://backend.ryaana059.workers.dev";

let messages = document.getElementById("messages");
let text = document.getElementById("text");

let chat = JSON.parse(localStorage.getItem("chat") || "[]");
let lastClear = localStorage.getItem("lastClear") || "0";
let sessionVersion = localStorage.getItem("sessionVersion") || "0";

/* LOAD CHAT */
chat.forEach(m => render(m.role, m.text));

function render(role, content, save=true){
  const div = document.createElement("div");
  div.className = "message " + role;
  div.innerText = content;
  messages.appendChild(div);

  if (save) {
    chat.push({ role, text: content });
    localStorage.setItem("chat", JSON.stringify(chat));
  }
}

/* SEND */
async function send() {
  const msg = text.value.trim();
  if (!msg) return;

  text.value = "";

  /* 🔥 TEAM REDIRECT RESTORED */
  if (msg.toLowerCase() === "te") {
    window.location.href = "https://teams.cloud.microsoft";
    return;
  }

  render("user", msg);

  const res = await fetch(API, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      messages:[{role:"user",content:msg}]
    })
  });

  const data = await res.json();

  render("ai", data?.choices?.[0]?.message?.content || "No response");
}

/* 🔥 SYNC (THIS FIXES CLEAR + LOGOUT) */
setInterval(async () => {
  try {
    const res = await fetch(API + "/status");
    const data = await res.json();

    /* CLEAR CHAT FIX */
    if (data.lastCleared &&
        data.lastCleared !== lastClear) {

      localStorage.removeItem("chat");
      messages.innerHTML = "";
      chat = [];

      lastClear = data.lastCleared;
      localStorage.setItem("lastClear", lastClear);
    }

    /* LOGOUT FIX */
    if (data.sessionVersion &&
        data.sessionVersion != sessionVersion) {

      localStorage.clear();
      alert("Logged out (admin change)");
      location.reload();
    }

  } catch {}
}, 3000);
</script>

</body>
</html>
