<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Teams and Channels | General | Microsoft Teams</title>

<link rel="icon" href="https://th.bing.com/th?q=Team%27s+Logo+White+Background&w=120&h=120&c=1&rs=1&qlt=70&o=7&dpr=2">

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
body {
  background: #0f172a;
  font-family: Arial;
  color: white;
  margin: 0;
  height: 100vh;
}

#login {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

#chat {
  width: 100vw;
  height: 100vh;
  display: none;
  flex-direction: column;
  background: #1e293b;
}

#header {
  background: #020617;
  padding: 10px;
}

#messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  background: #020617;
}

.message {
  padding: 10px;
  border-radius: 12px;
  max-width: 75%;
}

.user { background: #3b82f6; align-self: flex-end; }
.ai { background: #334155; align-self: flex-start; }

#inputArea {
  display: flex;
  padding: 10px;
}

textarea {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

button {
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #22c55e;
  color: white;
}
</style>
</head>

<body>

<div id="login">
  <h2>Enter Access</h2>
  <input type="password" id="password">
  <button onclick="login()">Enter</button>
</div>

<div id="chat">
  <div id="header">AI Chat 💬</div>
  <div id="messages"></div>

  <div id="inputArea">
    <textarea id="userInput" placeholder="Type here"></textarea>
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<!-- ONLY SCRIPT PART -->
<script>
const API = "https://backend.ryaana059.workers.dev";

let lastClear = 0;
let lastBroadcastId = null;

document.addEventListener("DOMContentLoaded", () => {

  const messages = document.getElementById("messages");
  const input = document.getElementById("userInput");

  /* ENTER TO SEND */
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  /* AUTO LOGIN */
  if (document.cookie.includes("chat_access=1")) {
    document.getElementById("login").style.display = "none";
    document.getElementById("chat").style.display = "flex";
  }

  setInterval(checkStatus, 3000);
});

/* LOGIN */
async function login() {
  const pass = document.getElementById("password").value;

  const res = await fetch(API + "/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ password: pass })
  });

  const data = await res.json();

  if (data.success) {
    document.cookie = "chat_access=1";
    location.reload();
  } else {
    alert("Wrong password");
  }
}

/* SEND */
async function sendMessage() {
  const input = document.getElementById("userInput");
  const messages = document.getElementById("messages");

  const text = input.value.trim();
  if (!text) return;

  input.value = "";

  const div = document.createElement("div");
  div.className = "message user";
  div.innerText = text;
  messages.appendChild(div);

  try {
    const res = await fetch(API, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        messages: [{ role: "user", content: text }]
      })
    });

    const data = await res.json();

    const ai = document.createElement("div");
    ai.className = "message ai";
    ai.innerText = data?.choices?.[0]?.message?.content || "No response";
    messages.appendChild(ai);

  } catch {
    alert("Error");
  }
}

/* STATUS */
async function checkStatus() {
  try {
    const res = await fetch(API + "/status");
    const data = await res.json();

    const messages = document.getElementById("messages");

    if (data.lastCleared && data.lastCleared !== lastClear) {
      lastClear = data.lastCleared;
      messages.innerHTML = "";
    }

    if (data.broadcast?.id && data.broadcast.id !== lastBroadcastId) {
      lastBroadcastId = data.broadcast.id;
      alert("SITE ADMIN: " + data.broadcast.text);
    }

  } catch {}
}
/*to se update*/
</script>
</body>
</html>
