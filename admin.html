<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<style>
body { background:#020617; color:white; font-family:Arial; padding:20px; }
.msg { padding:8px; margin:5px; border-radius:8px; }
.user { background:#3b82f6; }
.ai { background:#334155; }
</style>
</head>

<body>

<h1>🧠 Admin Panel</h1>

<h3>📢 Broadcast</h3>
<input id="broadcastMsg">
<button onclick="sendBroadcast()">Send</button>

<h3>🔒 Change Password</h3>
<input id="newPass">
<button onclick="changePassword()">Apply</button>

<h3>🧹 Logs</h3>
<button onclick="loadLogs()">Reload</button>
<button onclick="clearLogs()">Clear All</button>

<div id="logs"></div>

<script>
const API = "https://backend.ryaana059.workers.dev";

async function loadLogs() {
  const res = await fetch(API + "/logs");
  const data = await res.json();

  const box = document.getElementById("logs");
  box.innerHTML = "";

  data.forEach(m => {
    const div = document.createElement("div");
    div.className = "msg " + (m.role === "user" ? "user" : "ai");
    div.innerText = m.role + ": " + m.content;
    box.appendChild(div);
  });
}

async function clearLogs() {
  await fetch(API + "/clear");
  loadLogs();
}

async function sendBroadcast() {
  const msg = document.getElementById("broadcastMsg").value;

  await fetch(API + "/broadcast", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ message: msg })
  });
}

async function changePassword() {
  const pass = document.getElementById("newPass").value;

  await fetch(API + "/set-password", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ password: pass })
  });

  alert("Password changed + all users logged out");
}

setInterval(loadLogs, 3000);
loadLogs();
</script>

</body>
</html>
