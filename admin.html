<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.panel {
  width:500px;
  background:#1e293b;
  padding:20px;
  border-radius:12px;
}

input,textarea,button {
  width:100%;
  margin:5px 0;
  padding:10px;
  border:none;
  border-radius:8px;
}

button { background:#22c55e; color:white; cursor:pointer; }

#logs {
  background:#020617;
  padding:10px;
  border-radius:12px;
  height:250px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.log {
  padding:10px;
  border-radius:12px;
}

.log.user { background:#3b82f6; }
.log.admin { background:#22c55e; color:black; }
</style>
</head>

<body>

<div class="panel">

<div id="login">
  <input id="pass" type="password" placeholder="Admin Password">
  <button id="loginBtn">Login</button>
</div>

<div id="dash" style="display:none;">

<textarea id="msg" placeholder="Announcement"></textarea>
<button id="broadcastBtn">Broadcast</button>

<button id="clearBtn">Clear Chat</button>

<h3>Logs</h3>
<div id="logs"></div>

</div>

</div>

<script>
const API = "https://backend.ryaana059.workers.dev";

// ✅ Get elements once
const loginDiv = document.getElementById("login");
const dashDiv = document.getElementById("dash");
const passInput = document.getElementById("pass");
const msgInput = document.getElementById("msg");
const logsDiv = document.getElementById("logs");

const loginBtn = document.getElementById("loginBtn");
const broadcastBtn = document.getElementById("broadcastBtn");
const clearBtn = document.getElementById("clearBtn");

/* LOGIN */
loginBtn.onclick = async () => {
  try {
    const res = await fetch(API + "/adminLogin", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ password: passInput.value })
    });

    const data = await res.json();

    if (data.success) {
      loginDiv.style.display = "none";
      dashDiv.style.display = "block";

      loadLogs();
      setInterval(loadLogs, 3000);
    } else {
      alert("Wrong password");
    }
  } catch (e) {
    alert("Login failed (server error)");
  }
};

/* BROADCAST */
broadcastBtn.onclick = async () => {
  if (!msgInput.value.trim()) return;

  try {
    await fetch(API, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        type: "broadcast",
        text: msgInput.value
      })
    });

    msgInput.value = "";
  } catch {
    alert("Failed to send broadcast");
  }
};

/* CLEAR */
clearBtn.onclick = async () => {
  if (!confirm("Clear all chat?")) return;

  try {
    await fetch(API, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ type: "clear" })
    });
  } catch {
    alert("Failed to clear chat");
  }
};

/* LOGS */
async function loadLogs() {
  try {
    const res = await fetch(API + "/logs");
    const data = await res.json();

    const logs = (data.logs || []).slice().reverse();

    logsDiv.innerHTML = "";

    logs.forEach(l => {
      const div = document.createElement("div");
      div.className = "log " + (l.role || "user");

      // safer than innerHTML
      div.textContent = `${(l.role || "user").toUpperCase()}: ${l.content || ""}`;

      logsDiv.appendChild(div);
    });

  } catch {
    logsDiv.innerHTML = "<div>Failed to load logs</div>";
  }
}
</script>

</body>
</html>
