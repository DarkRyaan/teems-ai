<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-size:14px;
}

.panel {
  width:380px;
  background:#1e293b;
  padding:15px;
  border-radius:10px;
}

/* INPUTS */
input, textarea, button {
  width:100%;
  margin:4px 0;
  padding:8px;
  border:none;
  border-radius:6px;
  font-size:13px;
}

textarea {
  resize:none;
  height:60px;
}

button {
  background:#22c55e;
  color:white;
  cursor:pointer;
}

/* HEADINGS */
h3 {
  margin-top:10px;
  font-size:14px;
}

/* LOGS CONTAINER */
#logs {
  background:#020617;
  padding:8px;
  border-radius:10px;
  height:200px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:6px;
}

/* LOG MESSAGE BASE */
.log {
  padding:8px 10px;
  border-radius:12px;
  font-size:13px;
  max-width:80%;
  word-wrap:break-word;
}

/* USER MESSAGE (LEFT) */
.log.user {
  background:#3b82f6;
  align-self:flex-start;
}

/* BROADCAST (RIGHT LIKE ADMIN) */
.log.broadcast {
  background:#22c55e;
  color:black;
  align-self:flex-end;
}
</style>
</head>

<body>

<div class="panel">

<div id="login">
  <input id="pass" type="password" placeholder="Admin Password">
  <button id="loginBtn">Login</button>
</div>

<div id="dash" style="display:none;">

<textarea id="msg" placeholder="Announcement"></textarea>
<button id="broadcastBtn">Broadcast</button>

<button id="clearBtn">Clear Chat</button>

<h3>Logs</h3>
<div id="logs"></div>

<h3>Change Passwords</h3>

<input id="newUserPass" placeholder="New User Password">
<button id="setUserPassBtn">Update User Password</button>

<input id="newAdminPass" placeholder="New Admin Password">
<button id="setAdminPassBtn">Update Admin Password</button>

</div>

</div>

<script>
const API = "https://backend.ryaana059.workers.dev";

const loginBtn = document.getElementById("loginBtn");
const passInput = document.getElementById("pass");

const dash = document.getElementById("dash");
const loginDiv = document.getElementById("login");

const logsDiv = document.getElementById("logs");

/* LOGIN */
loginBtn.onclick = async () => {
  const res = await fetch(API + "/adminLogin", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ password: passInput.value })
  });

  const data = await res.json();

  if (data.success) {
    loginDiv.style.display = "none";
    dash.style.display = "block";
    passInput.value = ""; // ✅ clear password after login
    loadLogs();
    setInterval(loadLogs, 3000);
  } else {
    alert("Wrong password");
    passInput.value = ""; // ✅ clear on failure too
  }
};

/* BROADCAST */
document.getElementById("broadcastBtn").onclick = async () => {
  const msgBox = document.getElementById("msg");

  await fetch(API, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      admin:true,
      type:"broadcast",
      text: msgBox.value
    })
  });

  msgBox.value = ""; // ✅ clear announcement box
};

/* CLEAR */
document.getElementById("clearBtn").onclick = async () => {
  await fetch(API, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      admin:true,
      type:"clear"
    })
  });
};

/* PASSWORDS */
document.getElementById("setUserPassBtn").onclick = async () => {
  const input = document.getElementById("newUserPass");

  await fetch(API, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      admin:true,
      type:"setPassword",
      password: input.value
    })
  });

  input.value = ""; // ✅ clear after update
};

document.getElementById("setAdminPassBtn").onclick = async () => {
  const input = document.getElementById("newAdminPass");

  await fetch(API, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      admin:true,
      type:"setAdminPassword",
      password: input.value
    })
  });

  input.value = ""; // ✅ clear after update
};

/* LOGS */
async function loadLogs() {
  const res = await fetch(API + "/logs");
  const data = await res.json();

  logsDiv.innerHTML = "";

  (data.logs || []).reverse().forEach(l => {
    const div = document.createElement("div");

    const role = l.role || "user";
    div.className = "log " + role;

    div.innerText = `${role.toUpperCase()}: ${l.content}`;

    logsDiv.appendChild(div);
  });
}
</script>

</body>
</html>
