<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.panel {
  width:500px;
  background:#1e293b;
  padding:20px;
  border-radius:12px;
}

input,textarea,button {
  width:100%;
  margin:5px 0;
  padding:10px;
  border:none;
  border-radius:8px;
}

button { background:#22c55e; color:white; cursor:pointer; }

#logs {
  background:#020617;
  padding:10px;
  border-radius:12px;
  height:250px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.log {
  padding:10px;
  border-radius:12px;
}

.log.user { background:#3b82f6; }
.log.admin { background:#22c55e; color:black; }

h3 { margin-top:15px; }
</style>
</head>

<body>

<div class="panel">

<div id="login">
  <input id="pass" type="password" placeholder="Admin Password">
  <button id="loginBtn">Login</button>
</div>

<div id="dash" style="display:none;">

<textarea id="msg" placeholder="Announcement"></textarea>
<button id="broadcastBtn">Broadcast</button>

<button id="clearBtn">Clear Chat</button>

<h3>Logs</h3>
<div id="logs"></div>

<h3>Change Passwords</h3>

<input id="newUserPass" type="text" placeholder="New User Password">
<button id="setUserPassBtn">Set User Password</button>

<input id="newAdminPass" type="text" placeholder="New Admin Password">
<button id="setAdminPassBtn">Set Admin Password</button>

</div>

</div>



<script>
const API = "https://backend.ryaana059.workers.dev";

/* LOGIN stays same */
loginBtn.onclick = async () => {
  try {
    const res = await fetch(API + "/adminLogin", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ password: passInput.value })
    });

    const data = await res.json();

    if (data.success) {
      loginDiv.style.display = "none";
      dashDiv.style.display = "block";

      loadLogs();
      setInterval(loadLogs, 3000);
    } else {
      alert("Wrong password");
    }
  } catch {
    alert("Login failed (server error)");
  }
};

/* BROADCAST */
broadcastBtn.onclick = async () => {
  if (!msgInput.value.trim()) return;

  await fetch(API, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      admin:true,
      type:"broadcast",
      text:msgInput.value
    })
  });

  msgInput.value="";
};

/* CLEAR */
clearBtn.onclick = async () => {
  if (!confirm("Clear all chat?")) return;

  await fetch(API, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      admin:true,
      type:"clear"
    })
  });
};

/* SET USER PASS */
setUserPassBtn.onclick = async () => {
  await fetch(API, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      admin:true,
      type:"setPassword",
      password:newUserPass.value
    })
  });
};

/* SET ADMIN PASS */
setAdminPassBtn.onclick = async () => {
  await fetch(API, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      admin:true,
      type:"setAdminPassword",
      password:newAdminPass.value
    })
  });
};
</script>
</body>
</html>
