<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background: linear-gradient(135deg,#0f172a,#020617);
  color:white;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* PANEL */
.panel {
  width:420px;
  background:#111827;
  padding:20px;
  border-radius:16px;
  box-shadow:0 20px 50px rgba(0,0,0,0.6);
}

/* INPUTS */
input,textarea,button {
  width:100%;
  padding:10px;
  margin:6px 0;
  border:none;
  border-radius:10px;
}

/* BUTTON */
button {
  background:#22c55e;
  color:white;
  cursor:pointer;
}

/* DANGER */
.danger { background:#ef4444; }

/* LOGS */
.logs {
  background:#0b1220;
  padding:10px;
  border-radius:10px;
  max-height:200px;
  overflow-y:auto;
  font-size:12px;
}
</style>
</head>

<body>

<div class="panel">

<!-- LOGIN -->
<div id="loginBox">
  <h2>Admin Login</h2>
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- DASH -->
<div id="dash" style="display:none;">
  <h2>Control Panel</h2>

  <textarea id="msg" placeholder="Announcement"></textarea>
  <button onclick="broadcast()">📢 Broadcast</button>

  <button class="danger" onclick="clearChat()">🧹 Clear Chat</button>

  <input id="newpass" placeholder="User Password">
  <button onclick="setPass()">Change User Password</button>

  <input id="newadmin" placeholder="Admin Password">
  <button onclick="setAdmin()">Change Admin Password</button>

  <h3>Logs</h3>
  <button onclick="loadLogs()">Refresh Logs</button>
  <div class="logs" id="logs"></div>
</div>

</div>

<script>
const API = "https://backend.ryaana059.workers.dev/";

/* LOGIN */
async function login(){
  const res = await fetch(API+"adminLogin",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({password:pass.value})
  });

  const data = await res.json();

  if(data.success){
    loginBox.style.display="none";
    dash.style.display="block";
    loadLogs();
  } else {
    alert("Wrong password");
  }
}

/* BROADCAST */
async function broadcast(){
  await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({type:"broadcast",text:msg.value})
  });
}

/* CLEAR */
async function clearChat(){
  await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({type:"clear"})
  });
}

/* USER PASS */
async function setPass(){
  await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({type:"setPassword",password:newpass.value})
  });
}

/* ADMIN PASS */
async function setAdmin(){
  await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({type:"setAdminPassword",password:newadmin.value})
  });
}

/* LOGS (FIXED) */
async function loadLogs(){
  const res = await fetch(API+"logs");
  const data = await res.json();

  logs.innerHTML = data.logs.map(l =>
    `<div>[${new Date(l.time).toLocaleTimeString()}] ${l.role}: ${l.content}</div>`
  ).join("");
}
</script>

</body>
</html>
