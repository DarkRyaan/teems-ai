<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body {
  background:#020617;
  color:white;
  font-family:Arial;
  padding:20px;
}

button {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

#logs {
  margin-top:20px;
  max-height:70vh;
  overflow:auto;
}

.msg {
  padding:8px;
  margin:5px 0;
  border-radius:8px;
}

.user { background:#3b82f6; }
.ai { background:#334155; }
</style>
</head>

<body>

<h1>🧠 Admin Panel</h1>

<button onclick="loadLogs()">Reload</button>
<button onclick="clearLogs()">Clear All</button>

<div id="logs"></div>

<script>
const API = "https://backend.ryaana059.workers.dev";

async function loadLogs() {
  const res = await fetch(API + "/logs");
  const data = await res.json();

  const box = document.getElementById("logs");
  box.innerHTML = "";

  data.forEach(m => {
    const div = document.createElement("div");
    div.className = "msg " + (m.role === "user" ? "user" : "ai");
    div.innerText = m.role + ": " + m.content;
    box.appendChild(div);
  });
}

async function clearLogs() {
  await fetch(API + "/clear");
  loadLogs();
}

// auto refresh
setInterval(loadLogs, 3000);
loadLogs();
</script>

</body>
</html>
